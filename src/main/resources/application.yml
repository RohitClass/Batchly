spring:
  datasource:
    url: jdbc:mysql://localhost:3306/batchly_db
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    serialization:
      INDENT_OUTPUT: true

server:
  port: 8080

jwt:
  secret: your-secret-key
  expiration: 86400000 # 1 day
